name: Build STEP Fix Tool

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc

      - name: Build STATIC EXE
        shell: msys2 {0}
        run: |
          x86_64-w64-mingw32-g++ main.cpp -O2 -static -static-libgcc -static-libstdc++ -o step_fix.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: step-fix-exe
          path: step_fix.exe
