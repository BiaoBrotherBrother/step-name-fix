name: Build STEP Fix Tool

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      run: |
        cl /EHsc /std:c++17 main.cpp /Fe:step_fix.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: step-fix-exe
        path: step_fix.exe
